<!DOCTYPE html>
<html>

<head>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #game {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <div id="game">Loading Emulator...</div>
    <script>
        const paramsString = window.location.hash ? window.location.hash.substring(1) : window.location.search;
        const urlParams = new URLSearchParams(paramsString);
        let romUrl = urlParams.get('rom');
        let gameName = urlParams.get('name') || 'Unknown Game';

        if (!romUrl && window.location.hash.includes('rom=')) {
            const hashParts = window.location.hash.substring(1).split('&');
            for (let part of hashParts) {
                if (part.startsWith('rom=')) romUrl = decodeURIComponent(part.split('=')[1]);
                if (part.startsWith('name=')) gameName = decodeURIComponent(part.split('=')[1]);
            }
        }

        const currentUser = localStorage.getItem('nostalgia_current_user') || 'Guest';
        const safeGameName = `${currentUser}_${gameName}`.replace(/[^a-zA-Z0-9_-]/g, '_');

        if (romUrl) {
            window.EJS_player        = '#game';
            window.EJS_core          = 'mgba';
            window.EJS_gameUrl       = romUrl;
            window.EJS_gameName      = safeGameName;
            window.EJS_pathtodata    = 'https://cdn.emulatorjs.org/4.0.9/data/';
            window.EJS_startOnLoaded = true;
            window.EJS_threads       = false;

            window.EJS_defaultOptions = {
                'save-state-location': 'browser',
                'rewind': 'false',
            };

            // postMessage hooks pour SaveManager
            window.EJS_onSaveState = function(data) {
                if (!data || !data.state) return;
                window.parent.postMessage({
                    type: 'SAVE_STATE_RESPONSE',
                    state: Array.from(data.state),
                    gameName: gameName,
                    platform: 'gba',
                }, '*');
            };

            window.addEventListener('message', function(event) {
                if (!event.data || event.data.type !== 'TRIGGER_SAVE') return;
                waitForEmulator(function() {
                    try { window.EJS_emulator.saveState(); } catch(e) {}
                });
            });

            window.addEventListener('message', function(event) {
                if (!event.data || event.data.type !== 'LOAD_SAVE_STATE') return;
                var raw = event.data.state;
                if (!raw) return;
                var uint8 = raw instanceof Uint8Array ? raw : new Uint8Array(raw);
                waitForEmulator(function() {
                    try { window.EJS_emulator.loadState(uint8); } catch(e) {}
                });
            });

            // Controles overlay
            var keysOverlay = document.createElement('div');
            keysOverlay.style.cssText = [
                'position: fixed',
                'top: 50%',
                'left: 20px',
                'transform: translateY(-50%)',
                'color: rgba(255,255,255,0.4)',
                'font-family: Segoe UI, sans-serif',
                'font-size: 11px',
                'text-transform: uppercase',
                'letter-spacing: 1px',
                'line-height: 2',
                'pointer-events: none',
                'z-index: 1000',
                'text-shadow: 0 2px 4px rgba(0,0,0,0.5)',
            ].join(';');
            keysOverlay.innerHTML = '<div style="font-weight:800;color:#7ec4ff;margin-bottom:10px;font-size:13px;">CONTROLES</div>'
                + '<b>FLECHES</b> : DIR<br>'
                + '<b>X</b> : BOUTON A<br>'
                + '<b>Z</b> : BOUTON B<br>'
                + '<b>A</b> : BOUTON X<br>'
                + '<b>S</b> : BOUTON Y<br>'
                + '<b>C</b> : GACHETTE L<br>'
                + '<b>V</b> : GACHETTE R<br>'
                + '<b>ENTRER</b> : START<br>'
                + '<b>SHIFT</b> : SELECT';
            document.body.appendChild(keysOverlay);

            // Chargement EmulatorJS
            var script = document.createElement('script');
            script.src = 'https://cdn.emulatorjs.org/4.0.9/data/loader.js';
            document.body.appendChild(script);

            // Focus
            window.focus();
            document.addEventListener('mousedown', function() { window.focus(); });

            window.addEventListener('mousemove', function(e) {
                window.parent.postMessage({ type: 'mii-mousemove', x: e.clientX, y: e.clientY }, '*');
            });
            window.addEventListener('mousedown', function(e) {
                window.parent.postMessage({ type: 'mii-mousedown', x: e.clientX, y: e.clientY }, '*');
            });

        } else {
            document.getElementById('game').innerText = 'No ROM provided!';
        }

        function waitForEmulator(cb, retries) {
            retries = retries === undefined ? 40 : retries;
            if (window.EJS_emulator) { cb(); return; }
            if (retries <= 0) return;
            setTimeout(function() { waitForEmulator(cb, retries - 1); }, 250);
        }
    </script>
</body>

</html>
